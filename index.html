<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pengurusan LI — ADTEC Kuantan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-dark { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .loading-spinner { border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top: 3px solid #fff; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

   <script>
        const CONFIG = {
            GAS_URL: "https://script.google.com/macros/s/AKfycbwuzjqPWL32BXsmli3DCvoCsWrUex3qsP3OmRwQ8Hy9DTbEBevpFAI1gt8m-1Rms9y5Qw/exec", // <-- GANTI DENGAN NEW DEPLOYMENT
            ADMIN_PIN: "5547",
            TOKEN: "ADTEC2026" // <-- TOKEN KESELAMATAN BAHARU
        };

        let currentUser = null;
        let globalAdminData = [];

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('translate-y-20', 'opacity-0', 'text-green-400', 'text-red-400');
            toast.classList.add(type === 'success' ? 'text-green-400' : 'text-red-400', 'opacity-100', 'translate-y-0');
            setTimeout(() => { toast.classList.add('translate-y-20', 'opacity-0'); }, 4000);
        }

        async function handleLogin() {
            const ic = document.getElementById('inpIC').value;
            const ndp = document.getElementById('inpNDP').value;
            if (!ic || !ndp) return;
            document.getElementById('btnLogin').innerHTML = '<div class="loading-spinner"></div>';
            try {
                // Hantar TOKEN dalam GET parameter
                const res = await fetch(`${CONFIG.GAS_URL}?action=login&ic=${ic}&ndp=${ndp}&token=${CONFIG.TOKEN}`);
                const result = await res.json();
                if (result.status === 'success') {
                    currentUser = result.data;
                    renderStudentDashboard();
                } else {
                    alert(result.message);
                }
            } catch (e) { alert("Ralat Sambungan!"); }
            finally { document.getElementById('btnLogin').innerText = "MASUK"; }
        }

        // --- Fungsi Tab, Render, Change Status (Kekal sama dengan V3) ---
        function handleStatusChange() {
            const status = document.getElementById('fStatus').value;
            const tabLI = document.getElementById('btnTabSyarikat');
            const secBelajar = document.getElementById('secBelajar');
            const secKerja = document.getElementById('secKerja');
            const secBukti = document.getElementById('secBukti');

            tabLI.classList.add('hidden');
            secBelajar.classList.add('hidden');
            secKerja.classList.add('hidden');
            secBukti.classList.add('hidden');

            if (status === 'Latihan Industri') { tabLI.classList.remove('hidden'); } 
            else if (status === 'Sambung Belajar') { secBelajar.classList.remove('hidden'); secBukti.classList.remove('hidden'); switchTab('tabPelajar'); } 
            else if (status === 'Dapat Tawaran Kerja') { secKerja.classList.remove('hidden'); secBukti.classList.remove('hidden'); switchTab('tabPelajar'); }
        }

        function switchTab(tabId) {
            const tP = document.getElementById('tabPelajar'), tS = document.getElementById('tabSyarikat');
            const bP = document.getElementById('btnTabPelajar'), bS = document.getElementById('btnTabSyarikat');
            if (tabId === 'tabPelajar') {
                tP.classList.remove('hidden'); tS.classList.add('hidden');
                bP.className = 'pb-2 border-b-2 border-blue-500 text-blue-400 font-bold transition';
                if(!bS.classList.contains('hidden')) bS.className = 'pb-2 border-b-2 border-transparent text-slate-400 transition';
            } else {
                tS.classList.remove('hidden'); tP.classList.add('hidden');
                bS.className = 'pb-2 border-b-2 border-blue-500 text-blue-400 font-bold transition';
                bP.className = 'pb-2 border-b-2 border-transparent text-slate-400 transition';
            }
        }

        document.getElementById('fBukti').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                // Frontend Validation: Size limit 3MB sebelum hantar ke GAS
                if(file.size > 3 * 1024 * 1024) {
                    showToast("Saiz fail melebihi 3MB. Sila kecilkan gambar.", "error");
                    e.target.value = ""; // Reset input
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('buktiPreview').src = e.target.result;
                    document.getElementById('buktiPreviewContainer').classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            }
        });

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        function renderStudentDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('studentDashboard').classList.remove('hidden');
            document.getElementById('studentName').innerText = currentUser.nama;
            document.getElementById('studentCourse').innerText = currentUser.kursus;
            document.getElementById('dispIc').innerText = currentUser.ic;
            document.getElementById('dispNdp').innerText = currentUser.ndp;
            document.getElementById('dispSesi').innerText = currentUser.sesi || '-';
            
            document.getElementById('fStatus').value = currentUser.status || '';
            document.getElementById('fAlamat').value = currentUser.alamat || '';
            document.getElementById('fTel').value = currentUser.telefon || '';
            document.getElementById('fSyarikat').value = currentUser.alamatSyarikat || '';
            document.getElementById('fPenyelia').value = currentUser.penyelia || '';
            document.getElementById('fTelSyarikat').value = currentUser.telefonSyarikat || '';
            document.getElementById('fElaun').value = currentUser.elaun || '';
            document.getElementById('fLaporDiri').value = formatDateForInput(currentUser.laporDiri);
            document.getElementById('fMulaLI').value = formatDateForInput(currentUser.mulaLI);
            document.getElementById('fTamatLI').value = formatDateForInput(currentUser.tamatLI);
            document.getElementById('fNamaInstitusi').value = currentUser.namaInstitusi || '';
            document.getElementById('fAlamatInstitusi').value = currentUser.alamatInstitusi || '';
            document.getElementById('fTarikhDaftar').value = formatDateForInput(currentUser.tarikhDaftar);
            document.getElementById('fNamaKerja').value = currentUser.namaKerja || '';
            document.getElementById('fAlamatKerja').value = currentUser.alamatKerja || '';
            document.getElementById('fGajiKerja').value = currentUser.gajiKerja || '';

            if (currentUser.buktiUrl) {
                document.getElementById('buktiPreviewSediaAda').href = currentUser.buktiUrl;
                document.getElementById('buktiSediaAdaContainer').classList.remove('hidden');
            } else {
                document.getElementById('buktiSediaAdaContainer').classList.add('hidden');
            }
            handleStatusChange();
        }

        async function handleUpdate() {
            const btn = document.getElementById('btnUpdate');
            btn.disabled = true; btn.innerHTML = '<div class="loading-spinner border-2 h-4 w-4"></div> MENGHANTAR DATA...';
            
            const fileInput = document.getElementById('fBukti');
            let fileBase64 = null;
            let fileName = null;

            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                fileBase64 = await fileToBase64(file);
                // Nama fail selamat format: NDP_NAMAFAIL.jpg
                fileName = `${currentUser.ndp}_${file.name.replace(/[^a-zA-Z0-9.]/g, "_")}`;
            }

            const payload = {
                action: 'updatePelajar', 
                token: CONFIG.TOKEN, // <-- HANTAR TOKEN DI SINI
                rowIdx: currentUser.rowIdx, 
                ndp: currentUser.ndp, // Dihantar untuk bantu penamaan fail
                status: document.getElementById('fStatus').value,
                alamat: document.getElementById('fAlamat').value, 
                telefon: document.getElementById('fTel').value,
                alamatSyarikat: document.getElementById('fSyarikat').value, 
                penyelia: document.getElementById('fPenyelia').value,
                telefonSyarikat: document.getElementById('fTelSyarikat').value, 
                mulaLI: document.getElementById('fMulaLI').value,
                tamatLI: document.getElementById('fTamatLI').value, 
                laporDiri: document.getElementById('fLaporDiri').value, 
                elaun: document.getElementById('fElaun').value,
                namaInstitusi: document.getElementById('fNamaInstitusi').value, 
                alamatInstitusi: document.getElementById('fAlamatInstitusi').value,
                tarikhDaftar: document.getElementById('fTarikhDaftar').value, 
                namaKerja: document.getElementById('fNamaKerja').value,
                alamatKerja: document.getElementById('fAlamatKerja').value, 
                gajiKerja: document.getElementById('fGajiKerja').value,
                fileBase64: fileBase64,
                fileName: fileName,
                buktiSediaAda: currentUser.buktiUrl
            };

            try {
                const res = await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if (result.status === 'success') { 
                    showToast("Maklumat & Gambar Berjaya Disimpan!"); 
                    if (result.newBuktiUrl) currentUser.buktiUrl = result.newBuktiUrl;
                    renderStudentDashboard();
                } else {
                    showToast(result.message || "Ralat Menyimpan!", "error");
                }
            } catch (e) { showToast("Ralat Sistem", "error"); }
            finally { btn.disabled = false; btn.innerText = "SIMPAN / KEMASKINI MAKLUMAT"; }
        }

        async function fetchAdminData() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminDashboard').classList.remove('hidden');
            try {
                const res = await fetch(`${CONFIG.GAS_URL}?action=getAllPelajar&token=${CONFIG.TOKEN}`);
                const result = await res.json();
                if (result.status === 'success') { globalAdminData = result.data; renderAdminDashboard(); }
            } catch (e) { alert("Ralat!"); }
        }

        // --- Semua fungsi Admin Edit dan lain-lain di bawah ini kekal sama seperti V3 ---
        function renderAdminDashboard() {
            const tbody = document.getElementById('adminTableBody');
            let completeCount = 0;

            const html = globalAdminData.map((p, i) => {
                const isComp = isDataComplete(p);
                if(isComp) completeCount++;
                const buktiBadge = p.buktiUrl ? `<a href="${p.buktiUrl}" target="_blank" class="text-xs bg-yellow-500/20 text-yellow-400 px-2 py-1 rounded hover:bg-yellow-500/40">LIHAT</a>` : `<span class="text-xs text-slate-500">TIADA</span>`;
                return `
                <tr class="border-b border-slate-700">
                    <td class="p-3">${i+1}</td><td class="p-3">${p.nama}</td><td class="p-3 text-xs">${p.status || '-'}</td>
                    <td class="p-3">${buktiBadge}</td>
                    <td class="p-3"><span class="text-xs px-2 rounded ${isComp ? 'bg-green-500/20 text-green-400':'bg-red-500/20 text-red-400'}">${isComp ? 'LENGKAP':'TAK LENGKAP'}</span></td>
                    <td class="p-3 text-center"><button onclick="openAdminEdit(${i})" class="text-blue-400 font-bold hover:text-blue-300">Edit</button></td>
                </tr>`;
            }).join('');
            
            tbody.innerHTML = html;
            document.getElementById('statTotal').innerText = globalAdminData.length;
            document.getElementById('statComplete').innerText = completeCount;
            document.getElementById('statIncomplete').innerText = globalAdminData.length - completeCount;
        }

        function isDataComplete(p) { return p.status && p.alamat && p.telefon; }
        function formatDateForInput(d) { if(!d) return ''; return new Date(d).toISOString().split('T')[0]; }
        function logout() { location.reload(); }

        let currentPin = '';
        function openKeypad() { currentPin = ''; updatePinDots(); document.getElementById('keypadModal').classList.remove('hidden'); }
        function closeKeypad() { document.getElementById('keypadModal').classList.add('hidden'); }
        function pressPin(n) { if(currentPin.length < 4) currentPin += n; updatePinDots(); if(currentPin.length === 4) verifyAdmin(); }
        function updatePinDots() { const dots = document.getElementById('pinDots').children; for(let i=0; i<4; i++) dots[i].className = i < currentPin.length ? 'w-4 h-4 rounded-full bg-blue-500' : 'w-4 h-4 rounded-full border-2 border-slate-600'; }
        function verifyAdmin() { if(currentPin === CONFIG.ADMIN_PIN) { closeKeypad(); fetchAdminData(); } else { alert("PIN Salah!"); currentPin = ''; updatePinDots(); } }
        function clearPin() { currentPin = ''; updatePinDots(); }

        function toggleAdminViews() {
            const status = document.getElementById('aEditStatus').value;
            document.getElementById('aEditSecLI').classList.add('hidden');
            document.getElementById('aEditSecBelajar').classList.add('hidden');
            document.getElementById('aEditSecKerja').classList.add('hidden');
            if (status === 'Latihan Industri') document.getElementById('aEditSecLI').classList.remove('hidden');
            else if (status === 'Sambung Belajar') document.getElementById('aEditSecBelajar').classList.remove('hidden');
            else if (status === 'Dapat Tawaran Kerja') document.getElementById('aEditSecKerja').classList.remove('hidden');
        }

        function openAdminEdit(index) {
            const p = globalAdminData[index];
            document.getElementById('aEditRowIdx').value = p.rowIdx;
            document.getElementById('aEditNama').innerText = p.nama.toUpperCase();
            document.getElementById('aEditNDP').innerText = `NDP: ${p.ndp} | IC: ${p.ic}`;
            document.getElementById('aEditStatus').value = p.status || '';
            document.getElementById('aEditAlamat').value = p.alamat || '';
            document.getElementById('aEditTel').value = p.telefon || '';
            document.getElementById('aEditSyarikat').value = p.alamatSyarikat || '';
            document.getElementById('aEditPenyelia').value = p.penyelia || '';
            document.getElementById('aEditTelSyarikat').value = p.telefonSyarikat || '';
            document.getElementById('aEditElaun').value = p.elaun || '';
            document.getElementById('aEditLaporDiri').value = formatDateForInput(p.laporDiri);
            document.getElementById('aEditMulaLI').value = formatDateForInput(p.mulaLI);
            document.getElementById('aEditTamatLI').value = formatDateForInput(p.tamatLI);
            document.getElementById('aEditNamaInstitusi').value = p.namaInstitusi || '';
            document.getElementById('aEditAlamatInstitusi').value = p.alamatInstitusi || '';
            document.getElementById('aEditTarikhDaftar').value = formatDateForInput(p.tarikhDaftar);
            document.getElementById('aEditNamaKerja').value = p.namaKerja || '';
            document.getElementById('aEditAlamatKerja').value = p.alamatKerja || '';
            document.getElementById('aEditGajiKerja').value = p.gajiKerja || '';

            if (p.buktiUrl) {
                document.getElementById('aEditBuktiLink').href = p.buktiUrl;
                document.getElementById('aEditBuktiLink').classList.remove('hidden');
                document.getElementById('aEditTiadaBukti').classList.add('hidden');
            } else {
                document.getElementById('aEditBuktiLink').classList.add('hidden');
                document.getElementById('aEditTiadaBukti').classList.remove('hidden');
            }
            document.getElementById('aEditBuktiSediaAda').value = p.buktiUrl || '';

            toggleAdminViews();
            document.getElementById('adminEditModal').classList.remove('hidden');
        }

        function closeAdminEdit() { document.getElementById('adminEditModal').classList.add('hidden'); }

        async function saveAdminEdit() {
            const btn = document.getElementById('btnAdminSave');
            btn.disabled = true; btn.innerHTML = '<div class="loading-spinner border-2 h-4 w-4"></div>';
            
            const payload = {
                action: 'updatePelajar', 
                token: CONFIG.TOKEN, // <-- HANTAR TOKEN DI SINI
                rowIdx: document.getElementById('aEditRowIdx').value,
                status: document.getElementById('aEditStatus').value, alamat: document.getElementById('aEditAlamat').value,
                telefon: document.getElementById('aEditTel').value, alamatSyarikat: document.getElementById('aEditSyarikat').value,
                penyelia: document.getElementById('aEditPenyelia').value, telefonSyarikat: document.getElementById('aEditTelSyarikat').value,
                mulaLI: document.getElementById('aEditMulaLI').value, tamatLI: document.getElementById('aEditTamatLI').value,
                laporDiri: document.getElementById('aEditLaporDiri').value, elaun: document.getElementById('aEditElaun').value,
                namaInstitusi: document.getElementById('aEditNamaInstitusi').value, alamatInstitusi: document.getElementById('aEditAlamatInstitusi').value,
                tarikhDaftar: document.getElementById('aEditTarikhDaftar').value, namaKerja: document.getElementById('aEditNamaKerja').value,
                alamatKerja: document.getElementById('aEditAlamatKerja').value, gajiKerja: document.getElementById('aEditGajiKerja').value,
                buktiSediaAda: document.getElementById('aEditBuktiSediaAda').value 
            };

            try {
                const res = await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if (result.status === 'success') { showToast("Rekod Berjaya Dikemaskini!"); closeAdminEdit(); fetchAdminData(); }
            } catch (e) { showToast("Ralat Menyimpan", "error"); } 
            finally { btn.disabled = false; btn.innerText = "Simpan"; }
        }
    </script>
