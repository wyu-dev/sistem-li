<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pengurusan LI — ADTEC Kuantan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loading-spinner { border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top: 3px solid #fff; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <!-- KONFIGURASI (UBAH DI SINI) -->
    <script>
        const CONFIG = {
            // SALIN URL APPS SCRIPT ANDA DI SINI
            GAS_URL: "https://script.google.com/macros/s/AKfycbzqN-NzIAPmb4WVyRdordKoaBquwkWckenpOnipuLnNUhJHEA5ACGyj2pQxd1LsOJkmhw/exec", 
            ADMIN_PIN: "5542"
        };
    </script>

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-10">
            <img src="https://i.postimg.cc/RVvGnTkW/Logo_ADTEC_JTM_2025_small.png" alt="Logo ADTEC" class="h-20 mx-auto mb-4">
            <h1 class="text-3xl font-bold text-blue-400">SISTEM PENGURUSAN LI</h1>
            <p class="text-slate-400">ADTEC JTM Kampus Kuantan</p>
        </header>

        <!-- Login Screen -->
        <div id="loginScreen" class="glass p-8 rounded-2xl shadow-xl max-w-md mx-auto">
            <h2 class="text-xl font-semibold mb-6 text-center">Log Masuk Pelajar / Admin</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm mb-1 text-slate-300">No. Kad Pengenalan</label>
                    <input type="text" id="inpIC" placeholder="Contoh: 051107010525" class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm mb-1 text-slate-300">No. NDP</label>
                    <input type="text" id="inpNDP" placeholder="Contoh: 07225012" class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <button onclick="handleLogin()" id="btnLogin" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition flex items-center justify-center gap-2">
                    MASUK
                </button>
                <p id="loginError" class="text-red-400 text-sm text-center hidden"></p>
            </div>
        </div>

        <!-- Dashboard Pelajar (Hidden) -->
        <div id="studentDashboard" class="hidden space-y-6">
            <div class="glass p-6 rounded-2xl">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 id="studentName" class="text-2xl font-bold uppercase">NAMA PELAJAR</h2>
                        <p id="studentCourse" class="text-blue-400 font-medium"></p>
                    </div>
                    <button onclick="logout()" class="text-sm bg-red-500/20 text-red-400 px-3 py-1 rounded-lg hover:bg-red-500/30 transition">Keluar</button>
                </div>

                <!-- Sub Menu / Tabs -->
                <div class="flex space-x-6 border-b border-slate-700 mb-6">
                    <button onclick="switchTab('tabPelajar')" id="btnTabPelajar" class="pb-2 border-b-2 border-blue-500 text-blue-400 font-bold transition">Maklumat Pelajar</button>
                    <button onclick="switchTab('tabSyarikat')" id="btnTabSyarikat" class="pb-2 border-b-2 border-transparent text-slate-400 font-medium hover:text-white transition">Maklumat Syarikat</button>
                </div>

                <form id="updateForm">
                    <!-- TAB 1: MAKLUMAT PELAJAR -->
                    <div id="tabPelajar" class="space-y-6 animate-fade-in">
                        <!-- Paparan Maklumat Asas (Read-Only) -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-slate-800/50 p-5 rounded-xl border border-slate-700/50">
                            <div><span class="block text-xs text-slate-400 mb-1">NO. KAD PENGENALAN</span><p id="dispIc" class="font-medium text-slate-200"></p></div>
                            <div><span class="block text-xs text-slate-400 mb-1">NO. NDP</span><p id="dispNdp" class="font-medium text-slate-200"></p></div>
                            <div class="md:col-span-2"><span class="block text-xs text-slate-400 mb-1">SESI KEMASUKAN</span><p id="dispSesi" class="font-medium text-slate-200"></p></div>
                        </div>

                        <!-- Ruangan Input Pelajar -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="md:col-span-2">
                                <label class="block text-xs uppercase text-slate-400 mb-1">Alamat Tempat Tinggal Semasa</label>
                                <textarea id="fAlamat" rows="3" placeholder="Sila lengkapkan alamat..." class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"></textarea>
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-xs uppercase text-slate-400 mb-1">No. Telefon Pelajar</label>
                                <input type="text" id="fTel" placeholder="Contoh: 012-3456789" class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                            </div>
                        </div>
                    </div>

                    <!-- TAB 2: MAKLUMAT SYARIKAT -->
                    <div id="tabSyarikat" class="hidden space-y-6 animate-fade-in">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="md:col-span-2">
                                <label class="block text-xs uppercase text-slate-400 mb-1">Alamat Syarikat LI</label>
                                <textarea id="fSyarikat" rows="3" placeholder="Alamat penuh syarikat latihan industri..." class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"></textarea>
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-xs uppercase text-slate-400 mb-1">Nama Penyelia (PIC)</label>
                                <input type="text" id="fPenyelia" placeholder="Nama pegawai yang memantau..." class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                            </div>
                            <div>
                                <label class="block text-xs uppercase text-slate-400 mb-1">No. Telefon Syarikat / Penyelia</label>
                                <input type="text" id="fTelSyarikat" placeholder="Contoh: 03-12345678" class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                            </div>
                            <div>
                                <label class="block text-xs uppercase text-slate-400 mb-1">Elaun Diterima (RM)</label>
                                <input type="number" id="fElaun" placeholder="Contoh: 500" class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                            </div>
                            <div>
                                <label class="block text-xs uppercase text-slate-400 mb-1">Tarikh Lapor Diri LI</label>
                                <input type="date" id="fLaporDiri" class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                            </div>
                            <div class="hidden md:block"></div> <!-- Spacer -->
                            <div>
                                <label class="block text-xs uppercase text-slate-400 mb-1">Tarikh Mula LI</label>
                                <input type="date" id="fMulaLI" class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                            </div>
                            <div>
                                <label class="block text-xs uppercase text-slate-400 mb-1">Tarikh Tamat LI</label>
                                <input type="date" id="fTamatLI" class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                            </div>
                        </div>
                    </div>

                    <!-- Butang Simpan -->
                    <div class="pt-6 mt-6 border-t border-slate-700">
                        <button type="button" onclick="handleUpdate()" id="btnUpdate" class="w-full bg-green-600 hover:bg-green-500 text-white py-3 rounded-lg font-bold transition flex items-center justify-center gap-2">
                            KEMASKINI MAKLUMAT
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Dashboard Admin (Hidden) -->
        <div id="adminDashboard" class="hidden">
            <div class="glass p-6 rounded-2xl overflow-x-auto">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">Senarai Pelajar LI</h2>
                    <button onclick="logout()" class="text-sm bg-red-500/20 text-red-400 px-3 py-1 rounded-lg">Keluar</button>
                </div>
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="border-b border-slate-700">
                            <th class="p-3">Nama</th>
                            <th class="p-3">NDP</th>
                            <th class="p-3">Kursus</th>
                            <th class="p-3">Tindakan</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-5 right-5 glass p-4 rounded-xl shadow-2xl transition-transform translate-y-20 opacity-0 pointer-events-none"></div>

    <script>
        let currentUser = null;

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('translate-y-20', 'opacity-0', 'text-green-400', 'text-red-400');
            toast.classList.add(type === 'success' ? 'text-green-400' : 'text-red-400', 'opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        async function handleLogin() {
            const ic = document.getElementById('inpIC').value;
            const ndp = document.getElementById('inpNDP').value;
            const btn = document.getElementById('btnLogin');
            const err = document.getElementById('loginError');

            if (ic === "ADMIN" && ndp === CONFIG.ADMIN_PIN) {
                return fetchAdminData();
            }

            if (!ic || !ndp) {
                err.innerText = "Sila isi semua medan";
                err.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<div class="loading-spinner"></div>';
            err.classList.add('hidden');

            try {
                const url = `${CONFIG.GAS_URL}?action=login&ic=${ic}&ndp=${ndp}`;
                const res = await fetch(url);
                const result = await res.json();

                if (result.status === 'success') {
                    currentUser = result.data;
                    renderStudentDashboard();
                } else {
                    err.innerText = result.message || "Gagal bersambung ke data";
                    err.classList.remove('hidden');
                }
            } catch (e) {
                err.innerText = "Error: Pastikan URL GAS dan Kebenaran (Permission) telah diset.";
                err.classList.remove('hidden');
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.innerText = "MASUK";
            }
        }

        // Logic Tab Navigation
        function switchTab(tabId) {
            const tabPelajar = document.getElementById('tabPelajar');
            const tabSyarikat = document.getElementById('tabSyarikat');
            const btnPelajar = document.getElementById('btnTabPelajar');
            const btnSyarikat = document.getElementById('btnTabSyarikat');

            if (tabId === 'tabPelajar') {
                tabPelajar.classList.remove('hidden');
                tabSyarikat.classList.add('hidden');
                btnPelajar.classList.add('border-blue-500', 'text-blue-400');
                btnPelajar.classList.remove('border-transparent', 'text-slate-400');
                btnSyarikat.classList.remove('border-blue-500', 'text-blue-400');
                btnSyarikat.classList.add('border-transparent', 'text-slate-400');
            } else {
                tabSyarikat.classList.remove('hidden');
                tabPelajar.classList.add('hidden');
                btnSyarikat.classList.add('border-blue-500', 'text-blue-400');
                btnSyarikat.classList.remove('border-transparent', 'text-slate-400');
                btnPelajar.classList.remove('border-blue-500', 'text-blue-400');
                btnPelajar.classList.add('border-transparent', 'text-slate-400');
            }
        }

        // Helper: Convert Google Sheet Date format to YYYY-MM-DD for HTML input type="date"
        function formatDateForInput(dateString) {
            if (!dateString) return '';
            try {
                const d = new Date(dateString);
                if (isNaN(d.getTime())) return ''; // Return empty if invalid
                d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); // Fix timezone shift
                return d.toISOString().split('T')[0];
            } catch(e) { return ''; }
        }

        function renderStudentDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('studentDashboard').classList.remove('hidden');
            
            // Set Read-Only Data
            document.getElementById('studentName').innerText = currentUser.nama;
            document.getElementById('studentCourse').innerText = currentUser.kursus;
            document.getElementById('dispIc').innerText = currentUser.ic;
            document.getElementById('dispNdp').innerText = currentUser.ndp;
            document.getElementById('dispSesi').innerText = currentUser.sesi || 'Tiada maklumat';

            // Set Data Pelajar
            document.getElementById('fAlamat').value = currentUser.alamat || '';
            document.getElementById('fTel').value = currentUser.telefon || '';
            
            // Set Data Syarikat
            document.getElementById('fSyarikat').value = currentUser.alamatSyarikat || '';
            document.getElementById('fPenyelia').value = currentUser.penyelia || '';
            document.getElementById('fTelSyarikat').value = currentUser.telefonSyarikat || '';
            document.getElementById('fElaun').value = currentUser.elaun || '';
            document.getElementById('fLaporDiri').value = formatDateForInput(currentUser.laporDiri);
            document.getElementById('fMulaLI').value = formatDateForInput(currentUser.mulaLI);
            document.getElementById('fTamatLI').value = formatDateForInput(currentUser.tamatLI);

            // Default buka tab pelajar
            switchTab('tabPelajar');
        }

        async function handleUpdate() {
            const btn = document.getElementById('btnUpdate');
            btn.disabled = true;
            btn.innerText = "MENYIMPAN...";

            const params = new URLSearchParams({
                action: 'updatePelajar',
                rowIdx: currentUser.rowIdx,
                alamat: document.getElementById('fAlamat').value,
                telefon: document.getElementById('fTel').value,
                penyelia: document.getElementById('fPenyelia').value,
                alamatSyarikat: document.getElementById('fSyarikat').value,
                telefonSyarikat: document.getElementById('fTelSyarikat').value,
                mulaLI: document.getElementById('fMulaLI').value,
                tamatLI: document.getElementById('fTamatLI').value,
                laporDiri: document.getElementById('fLaporDiri').value,
                elaun: document.getElementById('fElaun').value
            });

            try {
                const res = await fetch(`${CONFIG.GAS_URL}?${params.toString()}`);
                const result = await res.json();
                if (result.status === 'success') {
                    showToast("Maklumat Berjaya Dikemaskini!");
                } else {
                    showToast("Gagal mengemaskini data", "error");
                }
            } catch (e) {
                showToast("Ralat sambungan", "error");
            } finally {
                btn.disabled = false;
                btn.innerText = "KEMASKINI MAKLUMAT";
            }
        }

        async function fetchAdminData() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminDashboard').classList.remove('hidden');
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '<tr><td colspan="4" class="text-center p-10">Memuatkan data...</td></tr>';

            try {
                const res = await fetch(`${CONFIG.GAS_URL}?action=getAllPelajar`);
                const result = await res.json();
                if (result.status === 'success') {
                    tbody.innerHTML = result.data.map(p => `
                        <tr class="border-b border-slate-800 hover:bg-white/5 transition">
                            <td class="p-3 font-medium">${p.nama}</td>
                            <td class="p-3 text-slate-400">${p.ndp}</td>
                            <td class="p-3 text-xs text-slate-400">${p.kursus}</td>
                            <td class="p-3">
                                <button class="bg-blue-500/20 text-blue-400 px-2 py-1 rounded text-xs">Lihat</button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (e) {
                showToast("Gagal memuatkan data admin", "error");
            }
        }

        function logout() {
            currentUser = null;
            location.reload();
        }
    </script>
</body>
</html>
